name: Build libz.dylib

on:
  push:
    branches: [ "main" ]
    tags: [ 'v*' ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    env:
      SDK_VERSION: "0.3.7"
      SDK_REPO: "touchHLE/common-3.0-sdk"
      
    steps:
    - uses: actions/checkout@v6
      with:
        submodules: 'true'
    
    - name: Setup Build Environment
      run: |
        wget https://apt.llvm.org/llvm.sh
        chmod +x llvm.sh
        sudo ./llvm.sh 22
        echo "CC=clang-22" >> $GITHUB_ENV
        echo "CXX=clang++-22" >> $GITHUB_ENV 

    - name: Download SDK
      run: |
        curl -L "https://github.com/${{ env.SDK_REPO }}/releases/download/v${{ env.SDK_VERSION }}/common-3.0.sdk-linux-x86_64.tar.gz" | tar xz
      
    - name: Configure CMake
      run: cmake -DCMAKE_TOOLCHAIN_FILE="common-3.0.sdk/cmake/Toolchain/common-3.0.cmake" -B build

    - name: Build
      run: cmake --build ${{github.workspace}}/build
    
    - uses: actions/upload-artifact@v7
      with:
        name: libz.1.2.3.dylib
        path: build/libz.1.2.3.dylib

    - name: Create Release
      uses: softprops/action-gh-release@v3
      if: startsWith(github.ref, 'refs/tags/')
      with:
        files: build/libz.1.2.3.dylib

